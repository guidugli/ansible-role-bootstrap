---
# tasks file for ansible-role-bootstrap

- name: Run tasks to detect SSH Port
  ansible.builtin.include_tasks: detect_sshd_port.yml
  when: ansible_connection | default("ssh") in ["ssh", "paramiko"]

- name: Check if Python 3 is installed
  raw: test -e /usr/bin/python3
  register: python_check
  changed_when: false
  failed_when: false

- name: Install dependencies for APT (Debian/Ubuntu)
  raw: |
    apt-get update -y && apt-get install -y python3 python3-apt
  when:
    - ansible_facts.os_family == "Debian"
    - python_check.rc != 0

- name: Install dependencies for DNF (RHEL/Fedora)
  raw: |
    dnf install -y python3 python3-libdnf
  when:
    - ansible_facts.os_family == "RedHat"
    - python_check.rc != 0

- name: Reset connection to use installed Python
  meta: reset_connection
